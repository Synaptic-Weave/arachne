name: Publish Docker Images

on:
  push:
    branches:
      - main

jobs:
  publish:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/arachne-gateway:latest
            ghcr.io/${{ github.repository_owner }}/arachne-gateway:${{ github.sha }}

      - name: Build and push portal image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.portal
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/arachne-portal:latest
            ghcr.io/${{ github.repository_owner }}/arachne-portal:${{ github.sha }}

      # Note: After first publish, set package visibility to public in GitHub:
      # Settings → Packages → arachne-gateway / arachne-portal → Change visibility → Public
