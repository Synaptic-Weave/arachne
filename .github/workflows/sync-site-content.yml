name: Sync Site Content

on:
  push:
    branches:
      - content/site-landing-page

jobs:
  sync:
    name: Merge into develop and main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    strategy:
      matrix:
        target: [develop, main]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ matrix.target }}
          fetch-depth: 0

      - name: Merge content branch
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/content/site-landing-page --no-ff \
            -m "chore: sync site content into ${{ matrix.target }}" \
            && echo "result=success" >> $GITHUB_OUTPUT \
            || echo "result=conflict" >> $GITHUB_OUTPUT

      - name: Push merge
        if: steps.merge.outputs.result == 'success'
        run: git push origin ${{ matrix.target }}

      - name: Create PR on conflict
        if: steps.merge.outputs.result == 'conflict'
        run: |
          git merge --abort
          gh pr create \
            --base ${{ matrix.target }} \
            --head content/site-landing-page \
            --title "chore: sync site content into ${{ matrix.target }}" \
            --body "Auto-merge failed due to conflicts. Please resolve manually."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
