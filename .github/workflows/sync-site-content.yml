name: Sync Site Content

on:
  push:
    branches:
      - content/site-landing-page

jobs:
  sync-develop:
    name: Merge into develop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Merge content branch
        id: merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/content/site-landing-page --no-ff \
            -m "chore: sync site content into develop" \
            && echo "result=success" >> $GITHUB_OUTPUT \
            || echo "result=conflict" >> $GITHUB_OUTPUT

      - name: Push merge
        if: steps.merge.outputs.result == 'success'
        run: git push origin develop

      - name: Warn on conflict
        if: steps.merge.outputs.result == 'conflict'
        run: |
          echo "::warning::Auto-merge into develop failed due to conflicts. Manual merge required."
          exit 1

  pr-main:
    name: Open PR to main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: existing
        run: |
          PR=$(gh pr list --base main --head content/site-landing-page --state open --json number --jq '.[0].number // empty')
          echo "pr=$PR" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR to main
        if: steps.existing.outputs.pr == ''
        run: |
          gh pr create \
            --base main \
            --head content/site-landing-page \
            --title "chore: sync site content into main" \
            --body "$(cat <<'EOF'
          ## Summary
          - Auto-generated PR to sync site content changes into main

          Triggered by push to `content/site-landing-page`.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
