name: Trigger auto deployment for ca-arachne-gateway-prod

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ca-arachne-gateway-prod-AutoDeployTrigger-1a494155-912a-479f-ad50-7efd16ce7880.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CAARACHNEGATEWAYPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CAARACHNEGATEWAYPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CAARACHNEGATEWAYPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.CAARACHNEGATEWAYPROD_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CAARACHNEGATEWAYPROD_REGISTRY_PASSWORD }}
          containerAppName: ca-arachne-gateway-prod
          resourceGroup: rg-arachne-prod
          imageToBuild: ghcr.io/ca-arachne-gateway-prod:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


